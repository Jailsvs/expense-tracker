<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo com gradiente azul → vermelho (cores do app) -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="115" fill="url(#bgGradient)"/>
  
  <!-- Grupo centralizado -->
  <g transform="translate(256, 280)">
    
    <!-- Casa/Família (branca para contrastar) -->
    <!-- Telhado -->
    <path d="M-130,0 L0,-120 L130,0" 
          stroke="white" 
          stroke-width="20" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"
          opacity="0.95"/>
    
    <!-- Paredes -->
    <path d="M-110,0 L110,0 L110,120 L-110,120 Z" 
          fill="white" 
          opacity="0.95"/>
    
    <!-- Porta -->
    <rect x="-30" y="50" width="60" height="70" rx="8" 
          fill="#1e40af" 
          opacity="0.9"/>
    
    <!-- Janelas -->
    <rect x="-85" y="30" width="35" height="35" rx="4" 
          fill="#3b82f6" 
          opacity="0.8"/>
    <rect x="50" y="30" width="35" height="35" rx="4" 
          fill="#3b82f6" 
          opacity="0.8"/>
    
    <!-- Divisões das janelas (cruz) -->
    <line x1="-67.5" y1="30" x2="-67.5" y2="65" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="-85" y1="47.5" x2="-50" y2="47.5" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="67.5" y1="30" x2="67.5" y2="65" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="50" y1="47.5" x2="85" y2="47.5" stroke="white" stroke-width="2" opacity="0.6"/>
    
    <!-- Pessoas/família (silhuetas brancas) -->
    <circle cx="-50" cy="-50" r="14" fill="white" opacity="0.7"/>
    <circle cx="0" cy="-60" r="18" fill="white" opacity="0.85"/>
    <circle cx="50" cy="-50" r="14" fill="white" opacity="0.7"/>
    
    <!-- Moeda R$ grande (amarela para destacar) -->
    <circle cx="90" cy="70" r="45" fill="url(#coinGradient)" opacity="0.95"/>
    <circle cx="90" cy="70" r="45" stroke="#f59e0b" stroke-width="4" fill="none"/>
    
    <!-- Símbolo R$ -->
    <text x="90" y="85" 
          text-anchor="middle" 
          font-family="Arial, sans-serif" 
          font-size="42" 
          font-weight="bold" 
          fill="#1e293b">R$</text>
  </g>
</svg>
