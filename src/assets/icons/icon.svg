<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo gradiente dourado/azul -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a843;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="house" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c870;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a843;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fundo -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  
  <!-- Casa/Família -->
  <g transform="translate(256, 256)">
    <!-- Telhado -->
    <path d="M-150,20 L0,-140 L150,20" 
          stroke="#f0c870" stroke-width="24" 
          stroke-linecap="round" stroke-linejoin="round" 
          fill="none"/>
    
    <!-- Paredes da casa -->
    <path d="M-120,20 L120,20 L120,160 L-120,160 Z" 
          fill="url(#house)" stroke="#d4a843" stroke-width="8"/>
    
    <!-- Porta -->
    <path d="M-40,160 L-40,80 Q-40,60 -20,60 L20,60 Q40,60 40,80 L40,160" 
          fill="#1e40af" stroke="#d4a843" stroke-width="6"/>
    
    <!-- Janelas -->
    <rect x="-90" y="50" width="40" height="40" rx="4" fill="#3b82f6" stroke="#d4a843" stroke-width="4"/>
    <rect x="50" y="50" width="40" height="40" rx="4" fill="#3b82f6" stroke="#d4a843" stroke-width="4"/>
    
    <!-- Pessoas (silhuetas família) -->
    <circle cx="-60" cy="-20" r="16" fill="#f0c870"/>
    <circle cx="0" cy="-30" r="20" fill="#fcd34d"/>
    <circle cx="60" cy="-20" r="16" fill="#f0c870"/>
    
    <!-- Moeda R$ (destaque) -->
    <circle cx="100" cy="90" r="50" fill="#fcd34d" stroke="#d4a843" stroke-width="6"/>
    <text x="100" y="110" text-anchor="middle" 
          font-family="Georgia, serif" font-size="50" 
          font-weight="bold" fill="#1e40af">R$</text>
  </g>
</svg>
